<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | WITHX Innovations</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,sans-serif;}

body{
  background:linear-gradient(135deg,#f8fafc,#e2e8f0);
  color:#111;
  overflow-x:hidden;
}

/* NAV */
nav{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:15px 30px;
  background:rgba(255,255,255,.8);
  backdrop-filter:blur(12px);
  z-index:1000;
  border-bottom:1px solid #e5e7eb;
}

.logo img{
  height:60px;   /* try 60-70 */
  width:auto;
}
nav{
  align-items:center;
}

.nav-links{
  display:flex;
  align-items:center;
  gap:18px;
}

nav a:hover{opacity:1;color:#38bdf8}
nav a{
  text-decoration:none;
  color:#111;
  opacity:.8;
  font-weight:500;
  transition:.3s;
}

nav a:hover{
  color:#38bdf8;
  opacity:1;
}

/* HERO */
.hero{
  padding-top:120px;
  text-align:center;
  padding-bottom:60px;
}
.hero h1{
  font-size:3.5rem;
  color:#0a1f44;
}
.hero p{
  color:#64748b;
  margin-top:10px;
}

/* CONTAINER */
.container{
  width:90%;
  max-width:1200px;
  margin:auto;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:30px;
}

/* GLASS CARD */
.card{
  background:rgba(255,255,255,.6);
  backdrop-filter:blur(15px);
  padding:30px;
  border-radius:25px;
  box-shadow:0 15px 40px rgba(0,0,0,.08);
  transition:.3s;
}
.card:hover{
  transform:translateY(-5px);
}

/* FORM */
input, textarea{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:12px;
  border:1px solid #ddd;
  outline:none;
}
textarea{height:120px;}

button{
  margin-top:15px;
  padding:12px 20px;
  border:none;
  border-radius:12px;
  background:#38bdf8;
  color:white;
  font-weight:600;
  cursor:pointer;
}
button:hover{background:#0284c7}

/* CONTACT INFO */
.info{margin:15px 0;font-size:1rem}

/* CLICK CALL BUTTON */
.call-btn{
  display:inline-block;
  padding:12px 20px;
  background:#38bdf8;
  color:white;
  border-radius:12px;
  text-decoration:none;
  font-weight:600;
  margin-top:10px;
}
.call-btn:hover{background:#0284c7}

/* WHATSAPP */
.whatsapp-btn{
  display:inline-block;
  padding:12px 20px;
  background:#25D366;
  color:white;
  border-radius:12px;
  text-decoration:none;
  font-weight:600;
  margin-top:10px;
  margin-left:10px;
}

/* SOCIAL */
.social a{
  margin-right:10px;
  text-decoration:none;
  color:#111;
  font-weight:500;
}
.social a:hover{color:#38bdf8}

/* MAP */
.map{
  margin-top:40px;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 15px 40px rgba(0,0,0,.08);
}

/* FLOATING BUTTONS */
.float{
  position:fixed;
  bottom:20px;
  right:20px;
  display:flex;
  flex-direction:column;
  gap:10px;
  z-index:999;
}
.float a{
  width:50px;
  height:50px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:50%;
  color:white;
  text-decoration:none;
  font-size:20px;
  box-shadow:0 10px 25px rgba(0,0,0,.15);
}
.call{background:#38bdf8;}
.whatsapp{background:#25D366;}

@media(max-width:768px){
  .grid{grid-template-columns:1fr;}
  .hero h1{font-size:2.5rem;}
  nav{
    flex-direction:column;
    gap:10px;
    align-items:flex-start;
  }
}

</style>
</head>

<body>

<nav>

    <!-- CONTACT INFO -->

     <a href="https://wa.me/919067936323"class="whatsapp-btn" target="_blank">💬 WhatsApp</a>

      <div class="info">📧 withx.innovations@gmail.com</div>

      <div class="social">
        <br>
        <a href="https://www.linkedin.com/company/withx-innovations/" target="_blank" rel="noopener">LinkedIn</a>
        <a href="https://www.instagram.com/withx.in?igsh=MWJuNDR4dmxiZDJh" target="_blank" rel="noopener">Instagram</a>

    </div>

  </div>

  <!-- MAP -->

      src="https://maps.google.com/maps?q=pune&t=&z=13&ie=UTF8&iwloc=&output=embed"

</div>

</body>
</html>
